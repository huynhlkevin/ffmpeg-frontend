<section formGroupName="inputDirectory">
  <fieldset>
    <legend>Input Directory</legend>
    <button type="button" (click)="onSelectInputDirectoryClick()">Select Input Directory</button>
    <input type="text" formControlName="path"/>
    @if (path.hasError('pathDoesNotExist')) {
      <div>Path does not exist.</div>
    } @else if (path.hasError('isNotDirectory')) {
      <div>Not a directory.</div>
    }
  </fieldset>
</section>
