<section>
  <fieldset>
    <legend>Audio Encoding</legend>
    <div>
      <label for="audioCodecSelect">Codec</label>
      <select id="audioCodecSelect" #codecSelect (change)="onSelectedCodecChange(codecSelect.value)">
        @for (codec of codecs; track $index) {
          <option>{{codec}}</option>
        }
      </select>
    </div>
  </fieldset>
</section>
