<section>
  <fieldset>
    <legend>Video Encoding</legend>
    <div>
      <label for="videoCodecSelect">Codec</label>
      <select id="videoCodecSelect" #codecSelect (change)="onSelectedCodecChange(codecSelect.value)">
        @for (codec of codecs; track $index) {
          <option>{{codec}}</option>
        }
      </select>
    </div>
    <div>
      <label for="videoPresetSelect">Preset</label>
      <select id="videoPresetSelect" #presetSelect (change)="onSelectedPresetChange(presetSelect.value)">
        @for (preset of presets; track $index) {
          @if (preset === defaultPreset) {
            <option selected>{{preset}}</option>
          } @else {
            <option>{{preset}}</option>
          }
        }
      </select>
    </div>
    <div>
      <label for="videoQualityRange">Quality {{quality}}</label>
      <input id="videoQualityRange" #qualityRange type="range" [min]="minQuality" [max]="maxQuality" [value]="quality" (input)="onQualityChange(qualityRange.value)"/>
    </div>
  </fieldset>
</section>
