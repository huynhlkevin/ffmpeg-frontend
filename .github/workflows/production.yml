name: Production

on:
  pull_request:

jobs:
  make:
    environment: production
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Create distributable
        run: npm run make

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-frontend-v${{ github.run_number }}
          path: ./out/make

